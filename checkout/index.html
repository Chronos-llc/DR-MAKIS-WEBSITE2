<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Checkout for Dr. William Makis treatment protocols and support products." />
    <meta name="robots" content="noindex, nofollow" />

    <title>Checkout | Dr. William Makis</title>

    <!-- Canonical URL -->
    <link rel="canonical" href="https://cancerhope.life/checkout/" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph (minimal — checkout shouldn't be shared widely) -->
    <meta property="og:title" content="Checkout | Dr. William Makis" />
    <meta property="og:site_name" content="Dr. William Makis" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/checkout.js"></script>

    <!-- Smartsupp Live Chat script -->
    <script type="text/javascript">
      var _smartsupp = _smartsupp || {};
      _smartsupp.key = 'f25db0a326a4529dc1a69b9ad0601d1e54185b2a';
      window.smartsupp ||
        (function (d) {
          var s,
            c,
            o = (smartsupp = function () {
              o._.push(arguments);
            });
          o._ = [];
          s = d.getElementsByTagName('script')[0];
          c = d.createElement('script');
          c.type = 'text/javascript';
          c.charset = 'utf-8';
          c.async = true;
          c.src = 'https://www.smartsuppchat.com/loader.js?';
          s.parentNode.insertBefore(c, s);
        })(document);

      window.addEventListener('load', function () {
        var attempts = 0;
        var ensureLauncher = setInterval(function () {
          attempts += 1;
          try {
            if (window.smartsupp) {
              smartsupp('chat:show');
              smartsupp('button:show');
              clearInterval(ensureLauncher);
            }
          } catch (e) {
            // keep retrying briefly until widget API is ready
          }
          if (attempts > 40) clearInterval(ensureLauncher);
        }, 250);
      });
    </script>
  </body>
</html>
